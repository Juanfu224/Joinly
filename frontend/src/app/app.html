<!-- Skip link para accesibilidad - permite saltar al contenido principal -->
<a href="#contenido-principal" class="c-skip-link">
  Saltar al contenido principal
</a>

<!-- Live region para anuncios de navegación SPA -->
@if (focusService.shouldAnnounceNavigation()) {
  <div
    role="status"
    aria-live="polite"
    aria-atomic="true"
    class="visually-hidden"
  >
    {{ focusService.navigationAnnouncement() }}
  </div>
}

<!-- Header de navegación principal -->
<app-header />

<!-- Breadcrumbs dinámicos (solo si existen) -->
@if (breadcrumbService.breadcrumbs().length > 0) {
  <div class="l-contenedor">
    <app-breadcrumbs />
  </div>
}

<!-- Contenido principal con router-outlet -->
<!-- tabindex="-1" permite foco programático para navegación SPA -->
<main class="l-main" id="contenido-principal" tabindex="-1">
  <router-outlet />
</main>

<!-- Footer de la aplicación -->
<app-footer />

<!-- Contenedor de toasts -->
<app-toast-container />

<!-- Modal global -->
<app-modal />

<!-- Modal de invitación -->
<app-invite-modal />

<!-- Spinner overlay global -->
@if (loadingService.isLoading()) {
  <app-spinner-overlay />
}
